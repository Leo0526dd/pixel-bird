<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content" />
  <title>像素飞鸟</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; min-height: 100%; background: #4aa3d8; color: #2a1a12;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif; overflow: hidden;
      overscroll-behavior: none; touch-action: none; -webkit-user-select: none; user-select: none;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: geometricPrecision;
    }
    body {
      display: grid; place-items: center; padding: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,246,166,.18)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 1px, transparent 1px 24px), #4aa3d8;
    }
    .game { width: min(100%, 520px, calc((100vh - 118px) * .675)); display: grid; gap: 6px; position: relative; }
    .scorebar { display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px; }
    .scorebar > div, .scorebar > button, .skin-group, .name-group, .audio-panel {
      border: 3px solid #552b17; border-radius: 7px; background: #fff0b8;
      box-shadow: inset -3px -3px 0 rgba(117,70,28,.18), 0 3px 0 #7b5125;
    }
    .scorebar > div { min-height: 42px; display: grid; place-items: center; padding: 4px 8px; }
    .scorebar span, .skin-group span, .name-group span, .audio-panel span { font-size: 12px; font-weight: 900; line-height: 1; }
    .scorebar strong { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; font-size: 20px; line-height: 1; }
    button { font: inherit; color: inherit; -webkit-appearance: none; appearance: none; touch-action: manipulation; }
    button:focus { outline: none; }
    button:active { filter: none; background-blend-mode: normal; }
    .scorebar > button {
      min-height: 42px; cursor: pointer; padding: 0 12px; background: #f26f3b; color: #fff8d9;
      font-weight: 900; text-shadow: 0 2px 0 #7d351b;
    }
    .skinbar { display: grid; grid-template-columns: 1.15fr .85fr; gap: 6px; }
    .skin-group { min-height: 40px; display: grid; grid-template-columns: 32px 1fr; gap: 5px; align-items: center; padding: 4px; }
    .skin-group > span { display: grid; place-items: center; min-height: 14px; }
    .segmented { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 4px; }
    .segmented button {
      min-height: 28px; display: grid; place-items: center; padding: 0 3px; cursor: pointer;
      border: 2px solid #7b5125; border-radius: 5px; background: #ffd96a; color: #5d2f18;
      font-size: 10px; font-weight: 900; line-height: 1; white-space: nowrap;
      box-shadow: inset -2px -2px 0 rgba(117,70,28,.16);
    }
    .segmented button.active { background: #2e7d36; color: #f7ffe8; }
    .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; justify-items: center; align-items: center; }
    .swatches button {
      width: 24px; height: 24px; cursor: pointer; border: 2px solid #7b5125; border-radius: 50%;
      box-shadow: inset -3px -3px 0 rgba(0,0,0,.18);
    }
    .swatches button.active {
      box-shadow: inset -3px -3px 0 rgba(0,0,0,.18), inset 0 0 0 3px #fff0b8, 0 0 0 3px #f26f3b;
    }
    .swatches button.locked { filter: grayscale(.85) brightness(.78); position: relative; }
    .canvas-button {
      width: 100%; aspect-ratio: 432 / 640; display: block; padding: 0; overflow: hidden; cursor: pointer;
      border: 5px solid #552b17; border-radius: 8px; background: #6ec6f1;
      box-shadow: 0 6px 0 #7b5125, 0 12px 20px rgba(60,35,16,.2); touch-action: none;
    }
    canvas { display: block; width: 100%; height: 100%; image-rendering: auto; }
    .name-group {
      min-height: 40px; display: grid; grid-template-columns: 42px 1fr; gap: 6px; align-items: center; padding: 4px;
    }
    .name-group input {
      width: 100%; min-width: 0; height: 28px; border: 2px solid #7b5125; border-radius: 5px;
      background: #fff8d9; color: #5d2f18; font: 900 13px "Microsoft YaHei", "PingFang SC", sans-serif;
      text-align: center; outline: none;
    }
    .audio-panel {
      min-height: 40px; display: grid; grid-template-columns: 42px 1fr; gap: 6px; align-items: center; padding: 4px;
      font-size: 10px; font-weight: 900; line-height: 1; grid-column: 2;
    }
    .hidden { display: none !important; }
    .name-modal {
      position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; padding: 18px;
      background: rgba(34,23,18,.42);
    }
    .name-card {
      width: min(92vw, 340px); display: grid; gap: 12px; padding: 18px;
      border: 4px solid #552b17; border-radius: 8px; background: #fff0b8;
      box-shadow: inset -4px -4px 0 rgba(117,70,28,.18), 0 8px 0 #7b5125;
      text-align: center;
    }
    .name-card h1 { margin: 0; font-size: 22px; line-height: 1.15; color: #5d2f18; }
    .name-card input {
      height: 42px; border: 3px solid #7b5125; border-radius: 6px; background: #fff8d9; color: #5d2f18;
      font: 900 18px "Microsoft YaHei", "PingFang SC", sans-serif; text-align: center; outline: none;
    }
    .name-card button {
      height: 40px; border: 3px solid #552b17; border-radius: 6px; background: #2e7d36; color: #f7ffe8;
      font-weight: 900; box-shadow: 0 3px 0 #7b5125;
    }
    .audio-panel label { display: flex; gap: 6px; align-items: center; justify-content: center; }
    .audio-panel input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2e7d36; }
    @media (max-width: 420px) {
      body { padding: 6px; }
      .game { width: min(100%, calc((100vh - 96px) * .675)); gap: 5px; }
      .scorebar { grid-template-columns: .8fr .8fr 1fr; }
      .scorebar > button { grid-column: auto; font-size: 13px; padding: 0 6px; }
      .scorebar > div { min-height: 38px; }
      .skinbar { grid-template-columns: 1fr; }
      .skin-group { min-height: 34px; grid-template-columns: 28px 1fr; }
      .name-group, .audio-panel { min-height: 34px; grid-template-columns: 34px 1fr; }
      .audio-panel { grid-column: auto; }
      .skin-group > span { font-size: 10px; }
      .segmented button { min-height: 24px; font-size: 10px; }
      .swatches button { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="scorebar">
      <div><span>得分</span><strong id="score">0</strong></div>
      <div><span>最高</span><strong id="best">0</strong></div>
      <button id="startBtn" type="button">点击开始</button>
    </section>
    <section class="skinbar">
      <div class="skin-group">
        <span>鸟</span>
        <div class="segmented" id="kindButtons"></div>
      </div>
      <div class="skin-group">
        <span>颜色</span>
        <div class="swatches" id="colorButtons"></div>
      </div>
      <section class="audio-panel" id="audioPanel" aria-label="声音设置">
        <span>音效</span>
        <label><input id="soundToggle" type="checkbox" checked />开启</label>
      </section>
    </section>
    <button class="canvas-button" id="canvasButton" type="button" aria-label="点击让小鸟飞起来">
      <canvas id="game" width="432" height="640"></canvas>
    </button>
  </main>
  <section class="name-modal" id="nameModal" aria-label="设置名字">
    <div class="name-card">
      <h1>你想叫什么？</h1>
      <input id="playerNameInput" type="text" maxlength="8" value="小飞鸟" aria-label="你想叫什么？" />
      <button id="confirmNameBtn" type="button">确定</button>
    </div>
  </section>
  <script>
    const W = 432, H = 640, birdX = 112, birdSize = 34, pipeW = 66, pipeGap = 174, groundH = 86;
    const gravity = 0.36, flapPower = -7.15, pipeSpeed = 2.18, pipeSpacing = 246, readyFrames = 84;
    const isWechat = /MicroMessenger/i.test(navigator.userAgent);
    const startBufferFrames = isWechat ? 112 : readyFrames;
    const weatherCycle = ["clear", "cloudy", "rainy", "windy", "snowy"];
    const weatherDurationFrames = 1800, weatherBlendFrames = 520;
    const kinds = [{ id: "chick", name: "小鸡" }, { id: "owl", name: "夜枭" }, { id: "parrot", name: "鹦鹉" }];
    const palettes = [
      { id: "sunny", name: "阳光", body: "#f6c65b", belly: "#ffe68c", wing: "#dd7b2f", beak: "#f07f2f", shadow: "#9a4b1d" },
      { id: "berry", name: "莓果", body: "#e85b7d", belly: "#ffd1dc", wing: "#9e3b7a", beak: "#ff9a35", shadow: "#6a2146" },
      { id: "mint", name: "薄荷", body: "#58cfa6", belly: "#d6fff2", wing: "#2d917c", beak: "#ffc34d", shadow: "#226558" },
      { id: "sky", name: "蓝天", body: "#54a7f7", belly: "#d8f1ff", wing: "#2e68c9", beak: "#ffb24a", shadow: "#224386" }
    ];
    const stageList = [
      { id: 1, min: 0, name: "Stage 1 白天", sky: "clear", pipeTint: "green" },
      { id: 2, min: 20, name: "Stage 2 黄昏", sky: "sunset", pipeTint: "green" },
      { id: 3, min: 50, name: "Stage 3 夜晚", sky: "night", pipeTint: "violet" },
      { id: 4, min: 100, name: "Stage 4 暴风雨", sky: "storm", pipeTint: "steel" }
    ];
    const achievementList = [
      { id: "score20", score: 20, text: "稳定起飞" },
      { id: "score50", score: 50, text: "穿越黄昏" },
      { id: "score100", score: 100, text: "夜航高手" },
      { id: "score150", score: 150, text: "风暴挑战者" }
    ];
    const unlockList = [
      { id: "berry", cost: 8, text: "莓果颜色" },
      { id: "mint", cost: 16, text: "薄荷颜色" },
      { id: "sky", cost: 28, text: "蓝天颜色" },
      { id: "storm-theme", cost: 40, text: "风暴背景主题" }
    ];
    let status = "ready", score = 0, best = Number(localStorage.getItem("pixel-bird-offline-best") || 0);
    let birdY = 220, velocity = 0, pipes = [], fruits = [], arrows = [], effects = [], frame = 0, runFrame = 0, birdKind = "chick", palette = palettes[0];
    let shieldCharges = 0, shieldGraceUntil = 0, boostUntil = 0, boostPipesLeft = 0, destroyCharges = 0, audioContext = null, ambient = null, npcCheerFrame = -999, lastTouchAt = 0;
    let rewardState = loadRewards(), runReward = null, lastStageId = 1;
    let soundEnabled = localStorage.getItem("pixel-bird-sound") !== "off", masterVolume = .78;
    let playerName = localStorage.getItem("pixel-bird-player-name") || "小飞鸟";
    let hasNamed = false;
    const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score"), bestEl = document.getElementById("best"), startBtn = document.getElementById("startBtn");
    const audioPanel = document.getElementById("audioPanel"), soundToggle = document.getElementById("soundToggle"), playerNameInput = document.getElementById("playerNameInput");
    const nameModal = document.getElementById("nameModal"), confirmNameBtn = document.getElementById("confirmNameBtn");

    function syncUi() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      startBtn.textContent = status === "ready" ? "点击开始" : status === "playing" ? "保持节奏" : status === "paused" ? "继续" : "再来一局";
      updateAudioPanel();
      soundToggle.checked = soundEnabled;
      playerNameInput.value = playerName;
      nameModal.classList.toggle("hidden", hasNamed);
      [...document.querySelectorAll("[data-kind]")].forEach((b) => b.classList.toggle("active", b.dataset.kind === birdKind));
      [...document.querySelectorAll("[data-color]")].forEach((b) => {
        const locked = !isUnlocked(b.dataset.color);
        b.classList.toggle("active", b.dataset.color === palette.id);
        b.classList.toggle("locked", locked);
        b.title = locked ? `${getUnlockCost(b.dataset.color)}金币解锁` : b.getAttribute("aria-label");
      });
    }

    function initControls() {
      const kindBox = document.getElementById("kindButtons");
      kinds.forEach((k) => {
        const btn = document.createElement("button");
        btn.textContent = k.name; btn.dataset.kind = k.id;
        btn.onclick = (event) => { event.stopPropagation(); birdKind = k.id; syncUi(); };
        kindBox.appendChild(btn);
      });
      const colorBox = document.getElementById("colorButtons");
      palettes.forEach((p) => {
        const btn = document.createElement("button");
        btn.title = p.name; btn.dataset.color = p.id; btn.style.background = p.body;
        btn.onclick = (event) => {
          event.stopPropagation();
          if (!isUnlocked(p.id)) {
            const cost = getUnlockCost(p.id);
            if (rewardState.coins >= cost) {
              rewardState.coins -= cost;
              rewardState.unlocks.push(p.id);
              saveRewards();
              playMilestone();
            } else {
              playCrash();
              return;
            }
          }
          palette = p; syncUi();
        };
        colorBox.appendChild(btn);
      });
      syncUi();
    }

    function updateAudioPanel() {
      audioPanel.classList.toggle("hidden", status === "playing" && runFrame >= startBufferFrames);
    }

    function loadRewards() {
      try {
        return JSON.parse(localStorage.getItem("pixel-bird-rewards") || "") || { coins: 0, xp: 0, achievements: [], unlocks: ["sunny"] };
      } catch {
        return { coins: 0, xp: 0, achievements: [], unlocks: ["sunny"] };
      }
    }

    function saveRewards() {
      localStorage.setItem("pixel-bird-rewards", JSON.stringify(rewardState));
    }

    function isUnlocked(id) {
      return id === "sunny" || rewardState.unlocks.includes(id);
    }

    function getUnlockCost(id) {
      return unlockList.find((item) => item.id === id)?.cost || 0;
    }

    function getDifficulty(scoreValue) {
      const ramp20 = smoothStep(clamp((scoreValue - 20) / 30, 0, 1));
      const ramp50 = smoothStep(clamp((scoreValue - 50) / 50, 0, 1));
      const ramp100 = smoothStep(clamp((scoreValue - 100) / 80, 0, 1));
      const challenge = isChallengeSegment(scoreValue) ? 1 : 0;
      return {
        speed: pipeSpeed + ramp20 * .34 + ramp100 * .28 + challenge * .12,
        gap: 178 - ramp50 * 18 - ramp100 * 10 - challenge * 6,
        spacing: 252 - ramp20 * 10 - ramp50 * 16 - challenge * 8,
        randomRange: 76 + ramp50 * 22 + ramp100 * 28,
        wind: scoreValue >= 100 ? (.018 + ramp100 * .012) : 0,
        movingChance: scoreValue >= 50 ? clamp((scoreValue - 50) / 120, 0, .28) : 0,
        arrowRate: scoreValue >= 100 ? 230 : scoreValue >= 50 ? 270 : 320
      };
    }

    function getStage(scoreValue) {
      let stage = stageList[0];
      for (const next of stageList) if (scoreValue >= next.min) stage = next;
      return stage;
    }

    function getRhythm(scoreValue) {
      const pattern = ["easy", "medium", "hard", "medium", "easy"];
      const type = pattern[Math.max(0, scoreValue - 1) % pattern.length];
      return {
        type,
        gapBonus: type === "easy" ? 16 : type === "hard" ? -10 : 0,
        spacingBonus: type === "easy" ? 18 : type === "hard" ? -10 : 0,
        randomBonus: type === "hard" ? 18 : type === "easy" ? -12 : 0,
        hazardBias: type === "hard" ? 1 : type === "easy" ? -1 : 0
      };
    }

    function isChallengeSegment(scoreValue) {
      return scoreValue >= 150 && scoreValue % 60 >= 0 && scoreValue % 60 < 12;
    }

    function finalizeRewards(finalScore) {
      const coins = Math.max(1, Math.floor(finalScore / 5) + (finalScore >= 50 ? 3 : 0));
      const xp = finalScore * 2 + coins;
      const newAchievements = achievementList.filter((a) => finalScore >= a.score && !rewardState.achievements.includes(a.id));
      const newUnlocks = [];
      rewardState.coins += coins;
      rewardState.xp += xp;
      rewardState.achievements.push(...newAchievements.map((a) => a.id));
      rewardState.unlocks.push(...newUnlocks.map((u) => u.id));
      saveRewards();
      return { coins, xp, newAchievements, newUnlocks };
    }

    function normalizeName() {
      playerName = playerNameInput.value.trim().slice(0, 8) || "小飞鸟";
      playerNameInput.value = playerName;
      localStorage.setItem("pixel-bird-player-name", playerName);
    }

    function restoreViewport() {
      requestAnimationFrame(() => {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      });
    }

    function confirmName() {
      normalizeName();
      hasNamed = true;
      playerNameInput.blur();
      restoreViewport();
      syncUi();
    }

    function resetGame() {
      score = 0; birdY = 220; velocity = 0; frame = 0; runFrame = 0; shieldCharges = 0; shieldGraceUntil = 0; boostUntil = 0; boostPipesLeft = 0; destroyCharges = 0;
      effects = []; arrows = []; runReward = null; lastStageId = getStage(0).id;
      const firstPipeX = isWechat ? W + 300 : W + 240;
      pipes = [createPipe(firstPipeX, 0, 1)];
      pipes.push(createPipe(pipes[0].x + getPipeSpacing(2), 1, 2));
      pipes.push(createPipe(pipes[1].x + getPipeSpacing(3), 2, 3));
      fruits = [createFruit(W + 560, 0)];
      syncUi();
    }

    function createPipe(x, seed, scoreValue) {
      const difficulty = getDifficulty(scoreValue);
      const rhythm = getRhythm(scoreValue);
      const range = difficulty.randomRange + rhythm.randomBonus;
      const wave = Math.sin(seed * 1.7) * range;
      const gapSize = clamp(difficulty.gap + rhythm.gapBonus, 136, 196);
      const gapY = clamp(238 + wave + ((seed * 43) % Math.max(40, range)), 150, H - groundH - 142);
      const moving = scoreValue >= 50 && ((seed * 37 + scoreValue) % 100) < difficulty.movingChance * 100 && rhythm.type !== "easy";
      return { x, gapY, baseGapY: gapY, gapSize, passed: false, scoreValue, moving, rhythm: rhythm.type, mechanism: createMechanism(scoreValue, rhythm), hazard: createPipeHazard(scoreValue, rhythm) };
    }

    function getPipeSpacing(scoreValue) {
      const difficulty = getDifficulty(scoreValue), rhythm = getRhythm(scoreValue);
      return clamp(difficulty.spacing + rhythm.spacingBonus, 210, 272);
    }

    function createMechanism(scoreValue, rhythm) {
      if (scoreValue < 4 || scoreValue % 10 === 0 || scoreValue % 3 !== 0) return null;
      if (rhythm.type === "easy" && scoreValue % 6 !== 0) return null;
      const kinds = ["gear", "spinner", "spark", "blade", "drop"];
      return { kind: kinds[scoreValue % kinds.length], offsetY: scoreValue % 2 === 0 ? -34 : 34 };
    }

    function createPipeHazard(scoreValue, rhythm) {
      if (scoreValue < 3 || scoreValue % 10 === 0) return null;
      if (rhythm.type === "easy") return null;
      if (scoreValue % 7 === 0) return { kind: "fire", side: scoreValue % 2 ? "top" : "bottom", phase: scoreValue * 13 };
      if (scoreValue % 5 === 0) return { kind: "spike", side: scoreValue % 2 ? "top" : "bottom", phase: scoreValue * 9 };
      return null;
    }

    function createFruit(x, seed) {
      const types = ["shield", "boost", "break"];
      const type = types[seed % types.length];
      const y = clamp(164 + ((seed * 97) % 250), 118, H - groundH - 116);
      return { x, y, type, taken: false, seed };
    }

    function createArrow(seed) {
      return { x: W + 44, y: clamp(142 + ((seed * 83) % 300), 110, H - groundH - 82), speed: 2.75 + (seed % 3) * .22, seed };
    }

    function flap() {
      if (status === "paused") { status = "playing"; syncUi(); return; }
      const ac = getAudioContext();
      if (ac) ensureAmbient(ac);
      playFlap();
      if (status === "ready" || status === "ended") { resetGame(); status = "playing"; }
      velocity = flapPower; syncUi();
    }

    function togglePause() {
      if (status === "playing") status = "paused";
      else if (status === "paused") status = "playing";
      syncUi();
    }

    function stepGame() {
      runFrame++;
      if (runFrame < startBufferFrames) {
        birdY += Math.sin(frame / 10) * .28;
        return;
      }
      const difficulty = getDifficulty(score);
      const boosting = frame < boostUntil && boostPipesLeft > 0;
      const speedScale = score === 0 ? .9 : 1;
      if (boosting) {
        velocity *= .72;
        birdY += (H * .43 - birdY) * .045;
      } else {
        if (difficulty.wind) velocity += Math.sin(frame / 52) * difficulty.wind;
        velocity += gravity;
        birdY += velocity;
      }
      const speed = (boosting ? difficulty.speed * 2.1 : difficulty.speed) * speedScale;
      for (const pipe of pipes) {
        pipe.x -= speed;
        if (pipe.moving) pipe.gapY = clamp(pipe.baseGapY + Math.sin((frame + pipe.scoreValue * 17) / 45) * 24, 142, H - groundH - 132);
        if (!pipe.passed && pipe.x + pipeW < birdX - birdSize / 2) {
          pipe.passed = true;
          const nextScore = score + 1, milestone = nextScore % 10 === 0, record = nextScore > best;
          score = nextScore;
          const nextStage = getStage(score);
          if (nextStage.id !== lastStageId) {
            lastStageId = nextStage.id;
            effects.push({ kind: "stage", x: W / 2, y: 118, start: frame, life: 110, text: nextStage.name });
            playMilestone();
          }
          if (boosting) boostPipesLeft--;
          milestone ? playMilestone() : playScore();
          if (record) { best = nextScore; localStorage.setItem("pixel-bird-offline-best", String(best)); playRecord(milestone ? .16 : 0); }
          syncUi();
        }
      }
      for (const fruit of fruits) fruit.x -= speed;
      for (const arrow of arrows) arrow.x -= arrow.speed * speedScale;
      if (pipes[0] && pipes[0].x + pipeW < -16) {
        pipes.shift();
        const last = pipes[pipes.length - 1];
        pipes.push(createPipe(last.x + getPipeSpacing(last.scoreValue + 1), frame, last.scoreValue + 1));
      }
      if (fruits[0] && fruits[0].x < -40) fruits.shift();
      const lastFruitX = fruits.length ? fruits[fruits.length - 1].x : W;
      if (lastFruitX < W + pipeSpacing * 3.2) fruits.push(createFruit(lastFruitX + pipeSpacing * (3.1 + (score % 2) * .6), frame + score));
      arrows = arrows.filter((arrow) => arrow.x > -70);
      if (score >= 50 && frame % (isChallengeSegment(score) ? 190 : difficulty.arrowRate) === 0 && arrows.length < (isChallengeSegment(score) ? 3 : 2)) arrows.push(createArrow(frame + score));
      const birdRect = { x: birdX - birdSize / 2 + 4, y: birdY - birdSize / 2 + 3, width: birdSize - 8, height: birdSize - 6 };
      const floorY = H - groundH;
      const hitCeiling = birdRect.y <= 0;
      const hitGround = birdRect.y + birdRect.height >= floorY;
      for (const fruit of fruits) {
        if (!fruit.taken && intersects(birdRect, { x: fruit.x - 13, y: fruit.y - 13, width: 26, height: 26 })) collectFruit(fruit);
      }
      const shieldActive = shieldCharges > 0 || frame < shieldGraceUntil;
      let obstacleHit = false;
      for (const pipe of pipes) {
        const topH = pipe.gapY - pipe.gapSize / 2, bottomY = pipe.gapY + pipe.gapSize / 2, mech = getMechanismRect(pipe);

    function chick(wingUp) { const p=palette; ctx.fillStyle=p.shadow;ctx.fillRect(-17,-11,30,25);ctx.fillStyle=p.body;ctx.fillRect(-14,-15,27,26);ctx.fillStyle=p.belly;ctx.fillRect(-7,-6,22,18);ctx.fillStyle=p.beak;ctx.fillRect(8,-3,20,8);ctx.fillStyle=p.shadow;ctx.fillRect(19,1,8,4);eye(3,-12);ctx.fillStyle=p.wing;ctx.fillRect(-19,wingUp?-2:6,17,12);ctx.fillStyle=p.body;ctx.fillRect(-16,wingUp?-6:9,13,8); }

    function eye(x,y){ctx.fillStyle="#fff";ctx.fillRect(x,y,8,8);ctx.fillStyle="#1f1f2a";ctx.fillRect(x+4,y+3,3,3);}

    function drawPowerHud() {
      const items = [];
      if (shieldCharges > 0) items.push([`盾防${shieldCharges}`, "#58cfa6"]);
      if (frame < boostUntil && boostPipesLeft > 0) items.push([`冲刺${boostPipesLeft}`, "#f6c65b"]);
      if (destroyCharges > 0) items.push([`破坏${destroyCharges}`, "#e85b7d"]);
      ctx.textAlign = "left"; ctx.textBaseline = "middle"; ctx.font = "700 13px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
      items.forEach((item, i) => { const x = 12 + i * 64; ctx.fillStyle = "#552b17"; ctx.fillRect(x, 18, 58, 22); ctx.fillStyle = item[1]; ctx.fillRect(x + 3, 21, 52, 16); ctx.fillStyle = "#fff8d9"; ctx.fillText(item[0], x + 7, 29); });
    }

    function drawProgressHud() {
      const stage = getStage(score), challenge = isChallengeSegment(score);
      ctx.textAlign = "left"; ctx.textBaseline = "middle"; ctx.font = "700 12px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
      ctx.fillStyle = "rgba(85,43,23,.78)"; ctx.fillRect(12, 48, challenge ? 118 : 92, 20);
      ctx.fillStyle = "#fff8d9"; ctx.fillText(stage.name.replace("Stage ", "S"), 18, 58);

    }
    function drawScore() { ctx.textAlign="center";ctx.textBaseline="top";ctx.font="700 42px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";ctx.lineWidth=7;ctx.strokeStyle="#552b17";ctx.strokeText(String(score),W/2,25);ctx.fillStyle="#fff3aa";ctx.fillText(String(score),W/2,25); }
    function drawOverlay() {
      ctx.fillStyle="rgba(34,23,18,.36)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#fff0b8";ctx.fillRect(54,192,W-108,184);ctx.fillStyle="#8d4f26";ctx.fillRect(54,192,W-108,10);ctx.fillRect(54,366,W-108,10);ctx.fillRect(54,192,10,184);ctx.fillRect(W-64,192,10,184);
      const preparing = status === "playing" && runFrame < startBufferFrames;
      ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#5d2f18";ctx.font="700 28px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
      ctx.fillText(preparing?"准备":status==="ready"?"像素飞鸟":status==="paused"?"已暂停":`${playerName}，再接再厉！`,W/2,230);
      ctx.font="700 17px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
      ctx.fillText(status==="ended"?"May the force be with you！":preparing?"开局保护中":`本局 ${score}   最高 ${best}`,W/2,274);
      if (status === "ended" && runReward) {
        const nextUnlock = unlockList.find((item) => !rewardState.unlocks.includes(item.id));
        const bonus = runReward.newAchievements.length ? `新成就 ${runReward.newAchievements[0].text}` : nextUnlock ? `目标 ${nextUnlock.text} ${rewardState.coins}/${nextUnlock.cost}金币` : `外观已全部解锁`;
        ctx.fillStyle = "#5d2f18"; ctx.font="700 13px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
        ctx.fillText(`+${runReward.coins} 金币  +${runReward.xp} 经验`, W/2, 298);
        ctx.fillText(bonus, W/2, 315);
      }
      ctx.fillStyle="#2e7d36";ctx.fillRect(118, status === "ended" ? 330 : 314,196,34);ctx.fillStyle="#f7ffe8";ctx.font="700 17px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";ctx.fillText(preparing?"看准节奏再飞":status==="paused"?"Esc 继续游戏":"点击 / 空格 起飞",W/2,status === "ended" ? 347 : 331);
    }

    function getAudioContext() { const C = window.AudioContext || window.webkitAudioContext; if (!C) return null; if (!audioContext) audioContext = new C(); if (audioContext.state === "suspended") audioContext.resume(); return audioContext; }
    function ensureAmbient(ac) {
      if (ambient) return;
      const rainGain=ac.createGain(), windGain=ac.createGain(), rainFilter=ac.createBiquadFilter(), windFilter=ac.createBiquadFilter(), rainSource=ac.createBufferSource(), windSource=ac.createBufferSource();
      rainGain.gain.value=.001; windGain.gain.value=.001; rainFilter.type="highpass"; rainFilter.frequency.value=1300; windFilter.type="lowpass"; windFilter.frequency.value=420;
      rainSource.buffer=noise(ac,2,1); windSource.buffer=noise(ac,3,.55); rainSource.loop=true; windSource.loop=true;
      rainSource.connect(rainFilter);rainFilter.connect(rainGain);rainGain.connect(ac.destination);windSource.connect(windFilter);windFilter.connect(windGain);windGain.connect(ac.destination);
      rainSource.start(); windSource.start(); ambient={rainGain,windGain,rainFilter,windFilter};
    }
    function outputVolume(vol) { return soundEnabled ? vol * masterVolume : .0001; }
    function updateAmbient(w) { if (!audioContext || !ambient) return; const rain=weatherAmount(w,"rainy"), wind=Math.max(weatherAmount(w,"windy"),weatherAmount(w,"snowy")*.35), now=audioContext.currentTime; ambient.rainGain.gain.setTargetAtTime(outputVolume(.001+rain*.013),now,.8); ambient.windGain.gain.setTargetAtTime(outputVolume(.001+wind*.009),now,.9); }
    function weatherAmount(w,m){return (w.current===m?1-w.blend:0)+(w.next===m?w.blend:0);}
    function noise(ac,dur,intensity){const b=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),data=b.getChannelData(0);let p=0;for(let i=0;i<data.length;i++){const white=Math.random()*2-1;p=p*.86+white*.14;data[i]=(white*.55+p*.45)*intensity;}return b;}
    function playFlap(){const ac=getAudioContext(); if(!ac||!soundEnabled)return; const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type="square";o.frequency.setValueAtTime(520,now);o.frequency.exponentialRampToValueAtTime(880,now+.055);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(outputVolume(.09),now+.008);g.gain.exponentialRampToValueAtTime(.001,now+.09);o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+.1);}
    function playScore(){const ac=getAudioContext();if(!ac)return;tone(ac,880,0,.09,.07,"sine");}
    function playMilestone(){const ac=getAudioContext();if(!ac)return;tone(ac,784,0,.08,.07,"triangle");tone(ac,1046,.075,.1,.08,"triangle");tone(ac,1568,.16,.16,.06,"sine");}

    function playFruit(type){const ac=getAudioContext();if(!ac)return;const base=type==="boost"?1046:type==="shield"?784:698;tone(ac,base,0,.055,.045,"triangle");tone(ac,base*1.25,.055,.08,.04,"sine");}
    function playBreak(){const ac=getAudioContext();if(!ac)return;tone(ac,220,0,.06,.035,"square");tone(ac,330,.045,.08,.03,"triangle");}
    function playCrash(){const ac=getAudioContext();if(!ac||!soundEnabled)return;const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";o.frequency.setValueAtTime(180,now);o.frequency.exponentialRampToValueAtTime(52,now+.28);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(outputVolume(.16),now+.02);g.gain.exponentialRampToValueAtTime(.001,now+.32);o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+.34);}

    function handlePrimaryInput(event) {
      if (event) event.preventDefault();
      if (!hasNamed) {
        nameModal.classList.remove("hidden");
        playerNameInput.focus();
        return;
      }
      const now = performance.now();
      if (now - lastTouchAt < 140) return;
      lastTouchAt = now;
      flap();
    }
    const canvasButton = document.getElementById("canvasButton");
    soundToggle.addEventListener("change", (event) => {
      soundEnabled = event.target.checked;
      localStorage.setItem("pixel-bird-sound", soundEnabled ? "on" : "off");
      updateAmbient(getWeather(frame));
      syncUi();
    });
    playerNameInput.addEventListener("input", (event) => {
      const nextName = event.target.value.trim().slice(0, 8) || "小飞鸟";
      playerName = nextName;
      localStorage.setItem("pixel-bird-player-name", playerName);
    });
    playerNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        confirmName();
      }
    });
    playerNameInput.addEventListener("blur", restoreViewport);
    confirmNameBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      confirmName();
    }, { passive: false });
    confirmNameBtn.addEventListener("click", (event) => {
      event.preventDefault();
      confirmName();
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (document.activeElement !== playerNameInput) restoreViewport();
      });
    }
    if (window.PointerEvent) {
      canvasButton.addEventListener("pointerdown", handlePrimaryInput, { passive: false });
      startBtn.addEventListener("pointerdown", handlePrimaryInput, { passive: false });
    } else {
      canvasButton.addEventListener("touchstart", handlePrimaryInput, { passive: false });
      startBtn.addEventListener("touchstart", handlePrimaryInput, { passive: false });
      canvasButton.addEventListener("mousedown", handlePrimaryInput, { passive: false });
      startBtn.addEventListener("mousedown", handlePrimaryInput, { passive: false });
    }
    document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });
    document.addEventListener("gesturestart", (event) => event.preventDefault());
    document.addEventListener("contextmenu", (event) => event.preventDefault());
