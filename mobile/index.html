<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content" />
  <title>像素飞鸟</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; min-height: 100%; background: #4aa3d8; color: #2a1a12;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif; overflow: hidden;
      overscroll-behavior: none; touch-action: none; -webkit-user-select: none; user-select: none;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: geometricPrecision;
    }
    body {
      display: grid; place-items: center; padding: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,246,166,.18)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 1px, transparent 1px 24px), #4aa3d8;
    }
    .game { width: min(100%, 520px, calc((100vh - 118px) * .675)); display: grid; gap: 6px; position: relative; }
    .scorebar { display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px; }
    .scorebar > div, .scorebar > button, .menu-row button, .sound-chip {
      border: 3px solid #552b17; border-radius: 7px; background: #fff0b8;
      box-shadow: inset -3px -3px 0 rgba(117,70,28,.18), 0 3px 0 #7b5125;
    }
    .scorebar > div { min-height: 42px; display: grid; place-items: center; padding: 4px 8px; }
    .scorebar span, .sound-chip span { font-size: 12px; font-weight: 900; line-height: 1; }
    .scorebar strong { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; font-size: 20px; line-height: 1; }
    button { font: inherit; color: inherit; -webkit-appearance: none; appearance: none; touch-action: manipulation; }
    button:focus { outline: none; }
    button:active { filter: none; background-blend-mode: normal; }
    .scorebar > button {
      min-height: 42px; cursor: pointer; padding: 0 12px; background: #f26f3b; color: #fff8d9;
      font-weight: 900; text-shadow: 0 2px 0 #7d351b;
    }
    .menu-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 6px; align-items: stretch; }
    .menu-row button, .sound-chip {
      min-height: 36px; display: grid; place-items: center; padding: 0 8px; cursor: pointer;
      color: #5d2f18; font-size: 13px; font-weight: 900; line-height: 1;
    }
    .menu-row button.active { background: #ffd96a; }
    .sound-chip { grid-template-columns: auto auto; gap: 6px; cursor: default; }
    .sound-chip input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2e7d36; }
    .canvas-button {
      width: 100%; aspect-ratio: 432 / 640; display: block; padding: 0; overflow: hidden; cursor: pointer;
      border: 5px solid #552b17; border-radius: 8px; background: #6ec6f1;
      box-shadow: 0 6px 0 #7b5125, 0 12px 20px rgba(60,35,16,.2); touch-action: none;
    }
    .side-pause {
      position: absolute; right: -58px; top: 52%; transform: translateY(-50%);
      width: 52px; min-height: 74px; border: 4px solid #552b17; border-radius: 9px;
      background: #fff0b8; color: #5d2f18; font-weight: 900; font-size: 14px; line-height: 1.1;
      box-shadow: inset -3px -3px 0 rgba(117,70,28,.18), 0 5px 0 #7b5125;
      cursor: pointer; z-index: 8; touch-action: manipulation;
    }
    .side-pause.active { background: #2e7d36; color: #f7ffe8; }
    canvas { display: block; width: 100%; height: 100%; image-rendering: auto; }
    .hidden { display: none !important; }
    .name-modal, .modal-layer {
      position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; padding: 18px;
      background: rgba(34,23,18,.42);
    }
    .name-card, .panel-card {
      width: min(92vw, 340px); display: grid; gap: 12px; padding: 18px;
      border: 4px solid #552b17; border-radius: 8px; background: #fff0b8;
      box-shadow: inset -4px -4px 0 rgba(117,70,28,.18), 0 8px 0 #7b5125;
      text-align: center;
    }
    .panel-card { width: min(94vw, 460px); max-height: min(84vh, 620px); overflow: hidden; text-align: left; }
    .name-card h1 { margin: 0; font-size: 22px; line-height: 1.15; color: #5d2f18; }
    .name-card input {
      height: 42px; border: 3px solid #7b5125; border-radius: 6px; background: #fff8d9; color: #5d2f18;
      font: 900 18px "Microsoft YaHei", "PingFang SC", sans-serif; text-align: center; outline: none;
    }
    .name-card button {
      height: 40px; border: 3px solid #552b17; border-radius: 6px; background: #2e7d36; color: #f7ffe8;
      font-weight: 900; box-shadow: 0 3px 0 #7b5125;
    }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .panel-head h2 { margin: 0; font-size: 20px; color: #5d2f18; }
    .panel-head button, .shop-item button {
      border: 3px solid #552b17; border-radius: 6px; background: #f26f3b; color: #fff8d9;
      font-weight: 900; box-shadow: 0 3px 0 #7b5125; min-height: 34px; padding: 0 10px;
    }
    .wallet { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-weight: 900; }
    #shopItems, #achievementItems {
      display: grid; gap: 8px; max-height: min(66vh, 470px); overflow-y: auto; padding-right: 3px;
    }
    .shop-section { display: grid; gap: 7px; margin-top: 2px; }
    .shop-section h3 { margin: 8px 0 0; font-size: 15px; color: #5d2f18; }
    .shop-item {
      display: grid; grid-template-columns: 1fr 58px auto; gap: 8px; align-items: center;
      padding: 9px; border: 2px solid #7b5125; border-radius: 6px; background: #fff8d9;
      box-shadow: inset -2px -2px 0 rgba(117,70,28,.12);
    }
    .achievement-item, .rank-item {
      display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
      padding: 9px; border: 2px solid #7b5125; border-radius: 6px; background: #fff8d9;
      box-shadow: inset -2px -2px 0 rgba(117,70,28,.12);
    }
    .achievement-item { grid-template-columns: 1fr 64px auto; min-height: 64px; }
    .rank-item { grid-template-columns: 1fr auto auto; }
    .shop-item strong, .achievement-item strong, .rank-item strong { display: block; font-size: 14px; color: #4b2817; }
    .shop-item p, .achievement-item p, .rank-item p { margin: 3px 0 0; font-size: 11px; line-height: 1.35; color: #70411f; }
    .shop-item .selected { background: #2e7d36; }
    .shop-preview {
      width: 54px; height: 44px; display: block; border: 2px solid #7b5125; border-radius: 5px;
      background: #9fd8ef; box-shadow: inset -2px -2px 0 rgba(117,70,28,.12);
    }
    .achievement-item.locked { filter: grayscale(.45); opacity: .72; }
    .achievement-preview {
      width: 60px; height: 48px; display: block; border: 2px solid #7b5125; border-radius: 5px;
      background: #9fd8ef; box-shadow: inset -2px -2px 0 rgba(117,70,28,.12);
    }
    .rank-list { display: grid; gap: 7px; max-height: 390px; overflow-y: auto; padding-right: 3px; }
    .rank-meta { font-size: 12px; line-height: 1.4; color: #70411f; }
    .rank-item.medal {
      background: linear-gradient(90deg, #fff8d9, #fff0b8);
      border-width: 3px;
    }
    .rank-item .medal-badge {
      width: 30px; height: 30px; display: grid; place-items: center; border-radius: 50%;
      border: 2px solid #552b17; color: #552b17; font-weight: 900; box-shadow: inset -2px -2px 0 rgba(0,0,0,.13);
    }
    .rank-item.gold .medal-badge { background: #f5c542; }
    .rank-item.silver .medal-badge { background: #d8dee2; }
    .rank-item.bronze .medal-badge { background: #c9864a; color: #fff8d9; }
    @media (max-width: 420px) {
      body { padding: 6px; }
      .game { width: min(100%, calc((100vh - 88px) * .675)); gap: 5px; }
      .scorebar { grid-template-columns: .8fr .8fr 1fr; }
      .scorebar > button { grid-column: auto; font-size: 13px; padding: 0 6px; }
      .scorebar > div { min-height: 38px; }
      .menu-row { grid-template-columns: 1fr 1fr 1fr auto; gap: 5px; }
      .menu-row button, .sound-chip { min-height: 32px; font-size: 12px; padding: 0 6px; }
      .side-pause { right: 8px; top: auto; bottom: 18px; transform: none; width: 48px; min-height: 54px; font-size: 12px; }
      .panel-card { padding: 14px; }
      .shop-item { grid-template-columns: 1fr 50px auto; gap: 6px; }
      .shop-preview { width: 48px; height: 40px; }
      .rank-list { max-height: 330px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="scorebar">
      <div><span>得分</span><strong id="score">0</strong></div>
      <div><span>最高</span><strong id="best">0</strong></div>
      <button id="startBtn" type="button">点击开始</button>
    </section>
    <section class="menu-row" id="menuRow">
      <button id="shopBtn" type="button">商店</button>
      <button id="achievementBtn" type="button">成就</button>
      <button id="rankBtn" type="button">排行</button>
      <label class="sound-chip" id="soundChip"><span>音效</span><input id="soundToggle" type="checkbox" checked /></label>
    </section>
    <button class="canvas-button" id="canvasButton" type="button" aria-label="点击让小鸟飞起来">
      <canvas id="game" width="432" height="640"></canvas>
    </button>
    <button class="side-pause hidden" id="pauseBtn" type="button" aria-label="暂停游戏">暂停</button>
  </main>
  <section class="name-modal" id="nameModal" aria-label="设置名字">
    <div class="name-card">
      <h1>你想叫什么？</h1>
      <input id="playerNameInput" type="text" maxlength="8" value="小飞鸟" aria-label="你想叫什么？" />
      <button id="confirmNameBtn" type="button">确定</button>
    </div>
  </section>
  <section class="modal-layer hidden" id="shopModal" aria-label="商店">
    <div class="panel-card">
      <div class="panel-head"><h2>商店</h2><button id="closeShopBtn" type="button">关闭</button></div>
      <div class="wallet"><span id="walletText">金币 0</span><span>只改变外观，不影响数值</span></div>
      <div id="shopItems"></div>
    </div>
  </section>
  <section class="modal-layer hidden" id="achievementModal" aria-label="成就">
    <div class="panel-card">
      <div class="panel-head"><h2>成就</h2><button id="closeAchievementBtn" type="button">关闭</button></div>
      <div id="achievementItems"></div>
    </div>
  </section>
  <section class="modal-layer hidden" id="rankModal" aria-label="排行榜">
    <div class="panel-card">
      <div class="panel-head"><h2>排行榜</h2><button id="closeRankBtn" type="button">关闭</button></div>
      <p class="rank-meta" id="rankMeta">正在读取前十名...</p>
      <div class="rank-list" id="rankItems"></div>
    </div>
  </section>
  <script>
    const W = 432, H = 640, birdX = 112, birdSize = 34, pipeW = 66, pipeGap = 174, groundH = 86;
    const gravity = 0.36, flapPower = -7.15, pipeSpeed = 2.18, pipeSpacing = 246, readyFrames = 84;
    const isWechat = /MicroMessenger/i.test(navigator.userAgent);
    const startBufferFrames = isWechat ? 112 : readyFrames;
    const boostExitGraceFrames = 18;
    const weatherCycle = ["clear", "cloudy", "rainy", "windy", "snowy"];
    const weatherDurationFrames = 1800, weatherBlendFrames = 520;
    const kinds = [
      { id: "chick", name: "小鸡", cost: 0, desc: "轻快的新手伙伴，适合稳定练习。" },
      { id: "owl", name: "夜枭", cost: 24, desc: "夜航风格，眼神更专注，适合挑战高分。" },
      { id: "parrot", name: "鹦鹉", cost: 36, desc: "鲜艳冒险家，飞过暴风雨也很醒目。" },
      { id: "ikun-classic", name: "ikun 黑发", cost: 25, rankGift: true, desc: "黑发背带篮球魂，朝左出击，足够醒目。" },
      { id: "ikun-silver", name: "ikun 银发", cost: 25, rankGift: true, desc: "银发冷面形态，朝左飞行，辨识度拉满。" },
      { id: "phoenix", name: "凤凰", cost: 0, limited: true, desc: "这是属于你的荣耀！！" }
    ];
    const palettes = [
      { id: "sunny", name: "阳光", cost: 0, desc: "经典暖色，清晰耐看。", body: "#f6c65b", belly: "#ffe68c", wing: "#dd7b2f", beak: "#f07f2f", shadow: "#9a4b1d" },
      { id: "berry", name: "莓果", cost: 8, desc: "甜莓色外观，适合活泼路线。", body: "#e85b7d", belly: "#ffd1dc", wing: "#9e3b7a", beak: "#ff9a35", shadow: "#6a2146" },
      { id: "mint", name: "薄荷", cost: 16, desc: "清爽薄荷配色，雨天也容易看清。", body: "#58cfa6", belly: "#d6fff2", wing: "#2d917c", beak: "#ffc34d", shadow: "#226558" },
      { id: "sky", name: "蓝天", cost: 28, desc: "蓝天主题，视觉更明亮。", body: "#54a7f7", belly: "#d8f1ff", wing: "#2e68c9", beak: "#ffb24a", shadow: "#224386" }
    ];
    const pipeThemes = [
      { id: "green", name: "经典绿管", cost: 0, desc: "像素冒险的经典管道。", colors: { dark:"#146b37", body:"#2fb85f", shine:"#92f27c", edge:"#0b4f2d", capDark:"#0f5d33", cap:"#39c96e" } },
      { id: "violet", name: "夜幕紫管", cost: 18, desc: "夜晚区域风格，沉稳但不压画面。", colors: { dark:"#3b2f68", body:"#6b5ac8", shine:"#b8a8ff", edge:"#282052", capDark:"#33275f", cap:"#7e6de0" } },
      { id: "steel", name: "风暴钢管", cost: 32, desc: "暴风雨主题，更像后期挑战区。", colors: { dark:"#334852", body:"#5f7d87", shine:"#b8d2d8", edge:"#22343c", capDark:"#2a414b", cap:"#71929d" } },
      { id: "gold", name: "纪念金管", cost: 48, desc: "把普通柱子换成纪念金色，十连里程碑仍会更亮。", colors: { dark:"#8b5a05", body:"#d99812", shine:"#fff18a", edge:"#5e3900", capDark:"#7a4700", cap:"#f2b622" } }
    ];
    const stageList = [
      { id: 1, min: 0, name: "Stage 1 白天", sky: "clear", pipeTint: "green" },
      { id: 2, min: 20, name: "Stage 2 黄昏", sky: "sunset", pipeTint: "green" },
      { id: 3, min: 50, name: "Stage 3 夜晚", sky: "night", pipeTint: "violet" },
      { id: 4, min: 100, name: "Stage 4 暴风雨", sky: "storm", pipeTint: "steel" }
    ];
    const achievementList = [
      { id: "score10", score: 10, text: "热身完成", desc: "单局达到10分。", icon: "coin" },
      { id: "score20", score: 20, text: "稳定起飞", desc: "单局达到20分。", icon: "bird" },
      { id: "score50", score: 50, text: "乌鸦来袭", desc: "单局达到50分并迎战乌鸦。", icon: "crow" },
      { id: "boss50", score: 50, text: "乌鸦退场", desc: "躲过乌鸦5次声波。", icon: "boss", manual: true },
      { id: "score75", score: 75, text: "节奏大师", desc: "单局达到75分。", icon: "stage" },
      { id: "score100", score: 100, text: "黑凤临空", desc: "单局达到100分并迎战黑凤凰。", icon: "phoenix" },
      { id: "boss100", score: 100, text: "黑凤熄焰", desc: "躲过黑凤凰5次声波。", icon: "boss", manual: true },
      { id: "score150", score: 150, text: "风暴挑战者", desc: "单局达到150分。", icon: "storm" },
      { id: "boss150", score: 150, text: "双生退场", desc: "躲过双生ikun的冲击波和飞鸡。", icon: "boss", manual: true },
      { id: "score200", score: 200, text: "传奇航线", desc: "单局达到200分。", icon: "crown" }
    ];
    const unlockList = [
      ...kinds.map((item) => ({ id: `bird-${item.id}`, cost: item.cost, text: item.name })),
      ...palettes.map((item) => ({ id: `color-${item.id}`, cost: item.cost, text: item.name })),
      ...pipeThemes.map((item) => ({ id: `pipe-${item.id}`, cost: item.cost, text: item.name }))
    ];
    const leaderboardConfig = { env: "pixelbird-d3gvwykqx50c17cbf", collection: "pixelbird_scores", enabled: true };
    let status = "ready", score = 0, best = Number(localStorage.getItem("pixel-bird-offline-best") || 0);
    let birdY = 220, velocity = 0, pipes = [], fruits = [], arrows = [], bosses = [], bossWaves = [], effects = [], frame = 0, runFrame = 0, birdKind = "chick", palette = palettes[0];
    let shieldCharges = 0, shieldGraceUntil = 0, boostUntil = 0, boostPipesLeft = 0, boostGraceUntil = 0, boostWasActive = false, destroyCharges = 0, audioContext = null, ambient = null, bossBgm = null, npcCheerFrame = -999, lastTouchAt = 0;
    let rewardState = loadRewards(), runReward = null, lastStageId = 1, sessionAchievements = [];
    let soundEnabled = localStorage.getItem("pixel-bird-sound") !== "off", masterVolume = .78;
    let playerName = localStorage.getItem("pixel-bird-player-name") || "小飞鸟";
    let playerId = getPlayerId(), pipeThemeId = localStorage.getItem("pixel-bird-pipe-theme") || "green", leaderboardClient = null;
    let hasNamed = false;
    const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score"), bestEl = document.getElementById("best"), startBtn = document.getElementById("startBtn"), pauseBtn = document.getElementById("pauseBtn");
    const menuRow = document.getElementById("menuRow"), soundChip = document.getElementById("soundChip"), soundToggle = document.getElementById("soundToggle"), playerNameInput = document.getElementById("playerNameInput");
    const nameModal = document.getElementById("nameModal"), confirmNameBtn = document.getElementById("confirmNameBtn");
    const shopModal = document.getElementById("shopModal"), achievementModal = document.getElementById("achievementModal"), rankModal = document.getElementById("rankModal");
    const shopItems = document.getElementById("shopItems"), achievementItems = document.getElementById("achievementItems"), rankItems = document.getElementById("rankItems"), walletText = document.getElementById("walletText"), rankMeta = document.getElementById("rankMeta");

    function syncUi() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      startBtn.textContent = status === "ready" ? "点击开始" : status === "playing" ? "保持节奏" : status === "paused" ? "继续" : "再来一局";
      pauseBtn.textContent = status === "paused" ? "继续" : "暂停";
      pauseBtn.classList.toggle("hidden", status === "ready" || status === "ended" || !hasNamed);
      pauseBtn.classList.toggle("active", status === "paused");
      updateAudioPanel();
      soundToggle.checked = soundEnabled;
      playerNameInput.value = playerName;
      nameModal.classList.toggle("hidden", hasNamed);
      renderShop();
      renderAchievements();
    }

    function initControls() {
      birdKind = localStorage.getItem("pixel-bird-kind") || birdKind;
      const savedPalette = palettes.find((p) => p.id === localStorage.getItem("pixel-bird-palette"));
      if (savedPalette) palette = savedPalette;
      if (!isUnlocked("bird", birdKind)) birdKind = "chick";
      if (!isUnlocked("color", palette.id)) palette = palettes[0];
      if (!isUnlocked("pipe", pipeThemeId)) pipeThemeId = "green";
      syncUi();
    }

    function updateAudioPanel() {
      menuRow.classList.toggle("hidden", status === "playing" && runFrame >= startBufferFrames);
    }

    function loadRewards() {
      const defaults = ["bird-chick", "color-sunny", "pipe-green", "sunny"];
      let state;
      try {
        state = JSON.parse(localStorage.getItem("pixel-bird-rewards") || "") || {};
      } catch {
        state = {};
      }
      state.coins = Number(state.coins || 0);
      state.xp = Number(state.xp || 0);
      state.achievements = Array.isArray(state.achievements) ? state.achievements : [];
      state.unlocks = Array.isArray(state.unlocks) ? state.unlocks : [];
      defaults.forEach((id) => { if (!state.unlocks.includes(id)) state.unlocks.push(id); });
      return state;
    }

    function saveRewards() {
      localStorage.setItem("pixel-bird-rewards", JSON.stringify(rewardState));
    }

    function getUnlockId(type, id) {
      return id.includes("-") ? id : `${type}-${id}`;
    }

    function isUnlocked(type, id) {
      const key = id ? getUnlockId(type, id) : type;
      return rewardState.unlocks.includes(key) || key === "sunny";
    }

    function getUnlockCost(id) {
      return unlockList.find((item) => item.id === id || item.id.endsWith(`-${id}`))?.cost || 0;
    }

    function getDifficulty(scoreValue) {
      const ramp20 = smoothStep(clamp((scoreValue - 20) / 30, 0, 1));
      const ramp50 = smoothStep(clamp((scoreValue - 50) / 50, 0, 1));
      const ramp100 = smoothStep(clamp((scoreValue - 100) / 80, 0, 1));
      const challenge = isChallengeSegment(scoreValue) ? 1 : 0;
      return {
        speed: pipeSpeed + ramp20 * .34 + ramp100 * .28 + challenge * .12,
        gap: 178 - ramp50 * 18 - ramp100 * 10 - challenge * 6,
        spacing: 252 - ramp20 * 10 - ramp50 * 16 - challenge * 8,
        randomRange: 76 + ramp50 * 22 + ramp100 * 28,
        wind: scoreValue >= 100 ? (.018 + ramp100 * .012) : 0,
        movingChance: scoreValue >= 50 ? clamp((scoreValue - 50) / 120, 0, .28) : 0,
        arrowRate: scoreValue >= 100 ? 230 : scoreValue >= 50 ? 270 : 320
      };
    }

    function getStage(scoreValue) {
      let stage = stageList[0];
      for (const next of stageList) if (scoreValue >= next.min) stage = next;
      return stage;
    }

    function getRhythm(scoreValue) {
      const pattern = ["easy", "medium", "hard", "medium", "easy"];
      const type = pattern[Math.max(0, scoreValue - 1) % pattern.length];
      return {
        type,
        gapBonus: type === "easy" ? 16 : type === "hard" ? -10 : 0,
        spacingBonus: type === "easy" ? 18 : type === "hard" ? -10 : 0,
        randomBonus: type === "hard" ? 18 : type === "easy" ? -12 : 0,
        hazardBias: type === "hard" ? 1 : type === "easy" ? -1 : 0
      };
    }

    function isChallengeSegment(scoreValue) {

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) { existing.addEventListener("load", resolve, { once: true }); resolve(); return; }
        const script = document.createElement("script");
        script.src = src; script.async = true; script.onload = resolve; script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function loadCloudBaseSdk() {
      const sources = [
        "https://static.cloudbase.net/cloudbase-js-sdk/2.27.1/cloudbase.full.js",
        "https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js",
        "https://static.cloudbase.net/cloudbase-js-sdk/3.0.1/cloudbase.full.js"
      ];
      let lastError = null;
      for (const src of sources) {
        try {
          await loadScript(src);
          if (window.cloudbase || window.tcb) return;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("sdk load failed");
    }

    async function getLeaderboardClient() {
      if (leaderboardClient) return leaderboardClient;
      if (!leaderboardConfig.enabled || !navigator.onLine) throw new Error("offline");
      await loadCloudBaseSdk();
      const cloudbaseApi = window.cloudbase || window.tcb;
      if (!cloudbaseApi) throw new Error("sdk");
      const app = cloudbaseApi.init({ env: leaderboardConfig.env });
      const auth = app.auth({ persistence: "local" });
      try {
        if (typeof auth.signInAnonymously === "function") {
          const result = await auth.signInAnonymously();
          if (result && result.error) throw result.error;
        } else if (typeof auth.anonymousAuthProvider === "function") {
          await auth.anonymousAuthProvider().signIn();
        } else {
          throw new Error("anonymous auth unavailable");
        }
      } catch (error) {
        throw new Error(`auth:${error?.message || error?.code || "failed"}`);
      }
      leaderboardClient = app.database();
      return leaderboardClient;
    }

      rows.push({ playerId, name: playerName, score: finalScore, createdAt: Date.now() });
      rows.sort((a, b) => b.score - a.score || b.createdAt - a.createdAt);
      localStorage.setItem("pixel-bird-local-ranks", JSON.stringify(rows.slice(0, 10)));
    }

    async function submitLeaderboard(finalScore) {
      if (finalScore <= 0) return;
      saveLocalRank(finalScore);
      try {
        const db = await getLeaderboardClient();
        await db.collection(leaderboardConfig.collection).add({
          playerId, name: playerName, score: finalScore, createdAt: Date.now()
        });
      } catch (error) {}
    }

    function getLeaderboardHint(error) {
      const message = String(error?.message || error || "");
      if (message.includes("offline")) return "当前设备离线";
      if (message.includes("auth")) return "请开启匿名登录并添加安全域名";
      if (message.includes("permission") || message.includes("PERMISSION")) return "请检查数据库安全规则";
      if (message.includes("sdk")) return "CloudBase SDK 未加载";

      rankMeta.textContent = `${title} · 玩家 ${playerName}`;

        rankItems.innerHTML = `<div class="rank-item"><div><strong>暂无记录</strong><p>完成一局后会自动记录分数。</p></div></div>`;
        return;
      }
      const topRows = rows
        .filter((row) => Number(row.score || 0) > 0)
        .slice(0, 10);
      if (!topRows.length) {
        rankItems.innerHTML = `<div class="rank-item"><div><strong>暂无有效成绩</strong><p>完成一局并获得分数后会进入排行榜。</p></div></div>`;
        return;

      maybeAwardRankRewards(topRows, title);
      topRows.forEach((row, index) => {

    function createPipe(x, seed, scoreValue) {
      const difficulty = getDifficulty(scoreValue);
      const rhythm = getRhythm(scoreValue);
      const range = difficulty.randomRange + rhythm.randomBonus;
      const wave = Math.sin(seed * 1.7) * range;
      const gapSize = clamp(difficulty.gap + rhythm.gapBonus, 136, 196);
      const gapY = clamp(238 + wave + ((seed * 43) % Math.max(40, range)), 150, H - groundH - 142);
      const moving = scoreValue >= 50 && ((seed * 37 + scoreValue) % 100) < difficulty.movingChance * 100 && rhythm.type !== "easy";
      return { x, gapY, baseGapY: gapY, gapSize, passed: false, scoreValue, moving, rhythm: rhythm.type, mechanism: createMechanism(scoreValue, rhythm), hazard: createPipeHazard(scoreValue, rhythm) };
    }

    function getPipeSpacing(scoreValue) {
      const difficulty = getDifficulty(scoreValue), rhythm = getRhythm(scoreValue);
      return clamp(difficulty.spacing + rhythm.spacingBonus, 210, 272);
    }

    function createMechanism(scoreValue, rhythm) {
      if (hasBossAtScore(scoreValue) || hasBossAtScore(scoreValue - 1) || hasBossAtScore(scoreValue + 1)) return null;
      if (scoreValue < 4 || scoreValue % 10 === 0 || scoreValue % 4 !== 0) return null;
      if (scoreValue % 8 === 4) return null;
      if (rhythm.type === "easy") return null;
      const kinds = ["gear", "spinner", "spark", "blade", "drop"];
      return { kind: kinds[scoreValue % kinds.length], offsetY: scoreValue % 2 === 0 ? -34 : 34 };
    }

    function createPipeHazard(scoreValue, rhythm) {
      if (hasBossAtScore(scoreValue) || hasBossAtScore(scoreValue - 1) || hasBossAtScore(scoreValue + 1)) return null;
      if (scoreValue < 3 || scoreValue % 10 === 0) return null;
      if (rhythm.type === "easy") return null;
      if (scoreValue % 7 === 0 && scoreValue % 14 !== 7) return { kind: "fire", side: scoreValue % 2 ? "top" : "bottom", phase: scoreValue * 13 };
      if (scoreValue % 6 === 0 && scoreValue % 12 !== 6) return { kind: "spike", side: scoreValue % 2 ? "top" : "bottom", phase: scoreValue * 9 };
      return null;
    }

    function hasBossAtScore(scoreValue) {
      return scoreValue === 50 || scoreValue === 100 || scoreValue === 150;
    }

    function createFruit(x, seed) {
      const types = ["shield", "boost", "break"];
      const type = types[seed % types.length];
      const y = clamp(164 + ((seed * 97) % 250), 118, H - groundH - 116);
      return { x, y, type, taken: false, seed };
    }

    function createArrow(seed) {
      return { x: W + 44, y: clamp(142 + ((seed * 83) % 300), 110, H - groundH - 82), speed: 2.75 + (seed % 3) * .22, seed };
    }

    function spawnBossForScore(scoreValue) {
      if (!hasBossAtScore(scoreValue) || bosses.some((boss) => boss.scoreValue === scoreValue)) return;

        const bonus = runReward.newAchievements.length ? `新成就 ${runReward.newAchievements[0].text}` : nextUnlock ? `目标 ${nextUnlock.text} ${rewardState.coins}/${nextUnlock.cost}金币` : `外观已全部解锁`;
        ctx.fillStyle = "#5d2f18"; ctx.font="700 13px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
        ctx.fillText(`+${runReward.coins} 金币  +${runReward.xp} 经验`, W/2, 298);
        ctx.fillText(bonus, W/2, 315);
      } else if (status === "ready") {
        ctx.fillStyle = "#8b5a05"; ctx.font="700 13px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";
        ctx.fillText("云端榜首可获得凤凰限定皮肤", W/2, 298);
      }
      ctx.fillStyle="#2e7d36";ctx.fillRect(118, status === "ended" ? 330 : 314,196,34);ctx.fillStyle="#f7ffe8";ctx.font="700 17px Microsoft YaHei, PingFang SC, Noto Sans SC, sans-serif";ctx.fillText(preparing?"看准节奏再飞":status==="paused"?"Esc 继续游戏":"点击 / 空格 起飞",W/2,status === "ended" ? 347 : 331);
    }

    function getAudioContext() { const C = window.AudioContext || window.webkitAudioContext; if (!C) return null; if (!audioContext) audioContext = new C(); if (audioContext.state === "suspended") audioContext.resume(); return audioContext; }
    function ensureAmbient(ac) {
      if (ambient) return;
      const rainGain=ac.createGain(), windGain=ac.createGain(), rainFilter=ac.createBiquadFilter(), windFilter=ac.createBiquadFilter(), rainSource=ac.createBufferSource(), windSource=ac.createBufferSource();
      rainGain.gain.value=.001; windGain.gain.value=.001; rainFilter.type="highpass"; rainFilter.frequency.value=1300; windFilter.type="lowpass"; windFilter.frequency.value=420;
      rainSource.buffer=noise(ac,2,1); windSource.buffer=noise(ac,3,.55); rainSource.loop=true; windSource.loop=true;
      rainSource.connect(rainFilter);rainFilter.connect(rainGain);rainGain.connect(ac.destination);windSource.connect(windFilter);windFilter.connect(windGain);windGain.connect(ac.destination);
      rainSource.start(); windSource.start(); ambient={rainGain,windGain,rainFilter,windFilter};
    }
    function outputVolume(vol) { return soundEnabled ? vol * masterVolume : .0001; }
    function updateAmbient(w) { if (!audioContext || !ambient) return; const rain=weatherAmount(w,"rainy"), wind=Math.max(weatherAmount(w,"windy"),weatherAmount(w,"snowy")*.35), now=audioContext.currentTime; ambient.rainGain.gain.setTargetAtTime(outputVolume(.001+rain*.013),now,.8); ambient.windGain.gain.setTargetAtTime(outputVolume(.001+wind*.009),now,.9); }
    function weatherAmount(w,m){return (w.current===m?1-w.blend:0)+(w.next===m?w.blend:0);}
    function noise(ac,dur,intensity){const b=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),data=b.getChannelData(0);let p=0;for(let i=0;i<data.length;i++){const white=Math.random()*2-1;p=p*.86+white*.14;data[i]=(white*.55+p*.45)*intensity;}return b;}
    function playFlap(){const ac=getAudioContext(); if(!ac||!soundEnabled)return; const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type="square";o.frequency.setValueAtTime(520,now);o.frequency.exponentialRampToValueAtTime(880,now+.055);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(outputVolume(.09),now+.008);g.gain.exponentialRampToValueAtTime(.001,now+.09);o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+.1);}
    function playScore(){const ac=getAudioContext();if(!ac)return;tone(ac,880,0,.09,.07,"sine");}
    function playMilestone(){const ac=getAudioContext();if(!ac)return;tone(ac,784,0,.08,.07,"triangle");tone(ac,1046,.075,.1,.08,"triangle");tone(ac,1568,.16,.16,.06,"sine");}
    function playUnlock(){const ac=getAudioContext();if(!ac)return;tone(ac,659,0,.06,.045,"triangle");tone(ac,880,.055,.08,.05,"triangle");tone(ac,1175,.12,.1,.045,"sine");}
    function playAchievement(){const ac=getAudioContext();if(!ac)return;tone(ac,523,0,.08,.05,"triangle");tone(ac,784,.08,.09,.055,"triangle");tone(ac,1046,.17,.14,.05,"sine");}
    function playRecord(delay=0){const ac=getAudioContext();if(!ac)return;tone(ac,659,delay,.07,.05,"sine");tone(ac,988,delay+.07,.11,.06,"sine");}
    function playNpcCheer(v){if(!audioContext||!soundEnabled)return;const p=[[740,920,"triangle"],[660,880,"sine"],[520,690,"square"],[820,1040,"triangle"],[590,760,"sine"],[700,540,"square"],[880,1108,"triangle"],[610,780,"sine"],[960,720,"triangle"]][v%9];tone(audioContext,p[0],0,.045,.012,p[2]);tone(audioContext,p[1],.055,.05,.011,p[2]);}
    function playFruit(type){const ac=getAudioContext();if(!ac)return;const base=type==="boost"?1046:type==="shield"?784:698;tone(ac,base,0,.055,.045,"triangle");tone(ac,base*1.25,.055,.08,.04,"sine");}
    function playBreak(){const ac=getAudioContext();if(!ac)return;tone(ac,220,0,.06,.035,"square");tone(ac,330,.045,.08,.03,"triangle");}
    function playBossWave(kind){const ac=getAudioContext();if(!ac)return;if(kind==="chicken"){tone(ac,620,0,.05,.026,"square");tone(ac,820,.045,.06,.022,"triangle");return;}tone(ac,kind==="shock"?210:160,0,.12,.035,"sawtooth");tone(ac,kind==="shock"?150:110,.08,.16,.025,"sine");}
    function playBossIntro(stronger=false){const ac=getAudioContext();if(!ac||!soundEnabled)return;const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";o.frequency.setValueAtTime(stronger?72:88,now);o.frequency.exponentialRampToValueAtTime(stronger?42:54,now+.72);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(outputVolume(stronger?.13:.1),now+.05);g.gain.exponentialRampToValueAtTime(.001,now+.82);o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+.86);tone(ac,stronger?196:174,.12,.12,.04,"triangle");tone(ac,stronger?147:130,.34,.18,.045,"sawtooth");tone(ac,stronger?98:110,.58,.2,.04,"sine");}
    function playTwinBossBgm(){if(!soundEnabled)return;stopBossBgm();try{bossBgm=new Audio("ikun-boss.mp3");bossBgm.volume=Math.min(.32, outputVolume(.28));bossBgm.currentTime=0;const p=bossBgm.play();if(p&&p.catch)p.catch(()=>{});setTimeout(()=>stopBossBgm(),8000);}catch(error){}playBossIntro(true);}
    function stopBossBgm(){if(!bossBgm)return;try{bossBgm.pause();bossBgm.currentTime=0;}catch(error){}bossBgm=null;}
    function playCrash(){const ac=getAudioContext();if(!ac||!soundEnabled)return;const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";o.frequency.setValueAtTime(180,now);o.frequency.exponentialRampToValueAtTime(52,now+.28);g.gain.setValueAtTime(.001,now);g.gain.exponentialRampToValueAtTime(outputVolume(.16),now+.02);g.gain.exponentialRampToValueAtTime(.001,now+.32);o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+.34);}
    function tone(ac,f,delay,dur,vol,type){if(!soundEnabled)return;const s=ac.currentTime+delay,o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.setValueAtTime(f,s);g.gain.setValueAtTime(.001,s);g.gain.exponentialRampToValueAtTime(outputVolume(vol),s+.012);g.gain.exponentialRampToValueAtTime(.001,s+dur);o.connect(g);g.connect(ac.destination);o.start(s);o.stop(s+dur+.02);}
    function clamp(v,min,max){return Math.min(Math.max(v,min),max);} function smoothStep(v){return v*v*(3-2*v);} function intersects(a,b){return a.x<b.x+b.width&&a.x+a.width>b.x&&a.y<b.y+b.height&&a.y+a.height>b.y;}
    function handlePrimaryInput(event) {
      if (event) event.preventDefault();
      if (!hasNamed) {
        nameModal.classList.remove("hidden");
        playerNameInput.focus();
        return;
      }
      const now = performance.now();
      if (now - lastTouchAt < 140) return;
      lastTouchAt = now;
      flap();
    }
    const canvasButton = document.getElementById("canvasButton");
    document.getElementById("shopBtn").addEventListener("click", (event) => { event.stopPropagation(); renderShop(); shopModal.classList.remove("hidden"); checkLeaderboardRewards(); });
    document.getElementById("achievementBtn").addEventListener("click", (event) => { event.stopPropagation(); renderAchievements(); achievementModal.classList.remove("hidden"); });
    document.getElementById("rankBtn").addEventListener("click", (event) => { event.stopPropagation(); openLeaderboard(); });
    document.getElementById("closeShopBtn").addEventListener("click", () => shopModal.classList.add("hidden"));
    document.getElementById("closeAchievementBtn").addEventListener("click", () => achievementModal.classList.add("hidden"));
    document.getElementById("closeRankBtn").addEventListener("click", () => rankModal.classList.add("hidden"));
    [shopModal, achievementModal, rankModal].forEach((modal) => {
      modal.addEventListener("pointerdown", (event) => { if (event.target === modal) modal.classList.add("hidden"); });
      modal.addEventListener("click", (event) => event.stopPropagation());
    });
    soundToggle.addEventListener("change", (event) => {
      soundEnabled = event.target.checked;
      if (!soundEnabled) stopBossBgm();
      localStorage.setItem("pixel-bird-sound", soundEnabled ? "on" : "off");
      updateAmbient(getWeather(frame));
      syncUi();
    });
    playerNameInput.addEventListener("input", (event) => {
      const nextName = event.target.value.trim().slice(0, 8) || "小飞鸟";
      playerName = nextName;
      localStorage.setItem("pixel-bird-player-name", playerName);
    });
    playerNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        confirmName();
      }
    });
    playerNameInput.addEventListener("blur", restoreViewport);
    confirmNameBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      confirmName();
    }, { passive: false });
    confirmNameBtn.addEventListener("click", (event) => {
      event.preventDefault();
      confirmName();
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        if (document.activeElement !== playerNameInput) restoreViewport();
      });
    }
    if (window.PointerEvent) {
      canvasButton.addEventListener("pointerdown", handlePrimaryInput, { passive: false });
      startBtn.addEventListener("pointerdown", handlePrimaryInput, { passive: false });
      pauseBtn.addEventListener("pointerdown", (event) => { event.preventDefault(); event.stopPropagation(); togglePause(); }, { passive: false });
    } else {
      canvasButton.addEventListener("touchstart", handlePrimaryInput, { passive: false });
      startBtn.addEventListener("touchstart", handlePrimaryInput, { passive: false });
      pauseBtn.addEventListener("touchstart", (event) => { event.preventDefault(); event.stopPropagation(); togglePause(); }, { passive: false });
      canvasButton.addEventListener("mousedown", handlePrimaryInput, { passive: false });
      startBtn.addEventListener("mousedown", handlePrimaryInput, { passive: false });
      pauseBtn.addEventListener("mousedown", (event) => { event.preventDefault(); event.stopPropagation(); togglePause(); }, { passive: false });
    }
    document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });
    document.addEventListener("gesturestart", (event) => event.preventDefault());
    document.addEventListener("contextmenu", (event) => event.preventDefault());
    window.addEventListener("keydown", (e) => {
      const modalOpen = !shopModal.classList.contains("hidden") || !achievementModal.classList.contains("hidden") || !rankModal.classList.contains("hidden") || !nameModal.classList.contains("hidden");
      if (e.code === "Escape") {
        e.preventDefault();
        if (!shopModal.classList.contains("hidden")) shopModal.classList.add("hidden");
        else if (!achievementModal.classList.contains("hidden")) achievementModal.classList.add("hidden");
        else if (!rankModal.classList.contains("hidden")) rankModal.classList.add("hidden");
        else togglePause();
      }
      if (!modalOpen && ["Space","ArrowUp","Enter"].includes(e.code)) { e.preventDefault(); flap(); }
    });
    initControls(); resetGame(); loop();
  </script>
